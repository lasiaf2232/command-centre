<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Project Dashboard</h1>
        </header>
        <main>
            <section id="project-landing">
                <h2>All Projects</h2>
                <div id="project-cards"></div>
            </section>
            <section id="market-data">
                <h2>Live Market Data</h2>
                <div id="market-widget"></div>
            </section>
        </main>
        <footer>
            <p>API Key Setup for first-time use:</p>
            <input type="text" id="api-key" placeholder="Enter your API Key">
            <button id="save-api-key">Save API Key</button>
        </footer>
    </div>

    <script>
        const API_KEY_STORAGE_KEY = 'apiKey';
        const NOTION_DATABASE_ID = 'c181429a-0318-8164-bf2e-0003a7a5fa2c';
        const POLYGON_API_URL = 'https://api.polygon.io/v2';

        // Save API Key to local storage
        $(document).on('click', '#save-api-key', function() {
            const apiKey = $('#api-key').val();
            localStorage.setItem(API_KEY_STORAGE_KEY, apiKey);
            alert('API Key saved!');
        });

        // Fetch Projects from Notion API
        async function fetchProjects() {
            const apiKey = localStorage.getItem(API_KEY_STORAGE_KEY);
            if (!apiKey) {
                alert('Please set up your API key.');
                return;
            }
            const response = await fetch(`https://api.notion.com/v1/databases/${NOTION_DATABASE_ID}/query`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${apiKey}`,
                    'Content-Type': 'application/json',
                    'Notion-Version': '2021-08-16' 
                }
            });
            const data = await response.json();
            organizeProjects(data.results);
        }

        function organizeProjects(projects) {
            const categories = { Personal: [], Work: [], 'Side Business': [] };
            projects.forEach(project => {
                if (project.properties.Status.select.name !== 'Completed') {
                    const category = project.properties.Category.select.name;
                    categories[category].push(project);
                }
            });
            displayProjects(categories);
        }

        function displayProjects(categories) {
            const projectCards = $('#project-cards');
            projectCards.empty();
            for (let category in categories) {
                const categorySection = `<h3>${category}</h3>`;
                projectCards.append(categorySection);
                categories[category].forEach(project => {
                    const card = `<div class="project-card" onclick="viewProject('${project.id}')">
                        <h4>${project.properties.Name.title[0].text.content}</h4>
                        <div class="progress-bar" style="width: ${project.properties.Progress.number}%"></div>
                        <span class="status-badge">${project.properties.Status.select.name}</span>
                    </div>`;
                    projectCards.append(card);
                });
            }
        }

        function viewProject(projectID) {
            // Display detailed project view
            alert('Viewing project: ' + projectID);
            // Implement detailed view logic here
        }

        // Fetch market data
        async function fetchMarketData() {
            const response = await fetch(`${POLYGON_API_URL}/marketdata`, { headers: { 'Authorization': `Bearer YOUR_POLYGON_API_KEY` } });
            const marketData = await response.json();
            displayMarketData(marketData);
        }

        function displayMarketData(data) {
            // Update market widget with data
            $('#market-widget').html(`S&P 500: ${data.sp500}, 10Y Yield: ${data.yield10y}, GBP/USD: ${data.gbpUsd}, Oil: ${data.oil}, Interest Rates: ${data.interestRates}`);
        }

        // Auto-refresh market data every 5 minutes
        setInterval(fetchMarketData, 5 * 60 * 1000);

        // Initial Calls
        fetchProjects();
        fetchMarketData();
    </script>
</body>
</html>
