<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/0.21.1/axios.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; }
        .project-category { margin: 20px 0; }
        .project { border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; }
        .zoom { cursor: zoom-in; }
    </style>
</head>
<body>
    <h1>Project Dashboard</h1>
    <div id="dashboard"></div>
    <input type="text" id="apiKey" placeholder="Enter API Keys" />
    <button id="saveKey">Save API Key</button>
    <script>
        // Sample function to fetch market data from Polygon.io
        async function fetchMarketData() {
            const apiKey = document.getElementById('apiKey').value;
            const response = await axios.get(`https://api.polygon.io/v2/aggs/ticker/AAPL/prev?apiKey=${apiKey}`);
            return response.data;
        }

        function renderProjects(data) {
            const dashboard = document.getElementById('dashboard');
            dashboard.innerHTML = '';
            for (const category in data) {
                const categoryDiv = document.createElement('div');
                categoryDiv.className = 'project-category';
                categoryDiv.innerHTML = `<h2>${category}</h2>`;
                data[category].forEach(project => {
                    const projectDiv = document.createElement('div');
                    projectDiv.className = 'project zoom';
                    projectDiv.innerHTML = `<h3>${project.name}</h3><p>${project.description}</p>`;
                    projectDiv.onclick = () => openProjectDetails(project);
                    categoryDiv.appendChild(projectDiv);
                });
                dashboard.appendChild(categoryDiv);
            }
        }

        function openProjectDetails(project) {
            alert(`Opening project: ${project.name}`);
            // Implement zoom functionality here
        }

        document.getElementById('saveKey').onclick = () => {
            const apiKey = document.getElementById('apiKey').value;
            // Save the API key logic here
            alert('API Key saved!');
        };

        // Load initial market data and projects
        fetchMarketData().then(data => {
            // renderProjects with fetched data
            renderProjects({
                Personal: [{name: 'Project 1', description: 'Description of project 1'}, {name: 'Project 2', description: 'Description of project 2'}],
                Work: [{name: 'Project 3', description: 'Description of project 3'}],
                'Side Business': [{name: 'Project 4', description: 'Description of project 4'}]
            });
        });
    </script>
</body>
</html>
